services:
  - type: web
    name: psicoedu-analytics-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FRONTEND_ORIGINS
        value: http://localhost:5173
